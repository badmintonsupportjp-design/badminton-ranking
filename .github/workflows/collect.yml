# 全国バドミントン成績 自動収集（週1回、クラウドで実行。手元作業ゼロ）
name: collect-badminton-results
on:
  schedule:
    - cron: "0 21 * * 5"   # 毎週土曜 朝6時(JST)
  workflow_dispatch: {}     # 手動実行ボタンも使える
permissions:
  contents: write
concurrency:
  group: collect            # 二重実行の衝突防止
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install free OCR (日本語tesseract + poppler)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-jpn poppler-utils
      - name: install deps
        working-directory: backend
        run: npm install
      - name: collect (全国巡回 → data.json)
        working-directory: backend
        run: node auto.js
      - name: save results (衝突しない保存方式)
        run: |
          git config user.name "collector-bot"
          git config user.email "bot@users.noreply.github.com"
          # 生成物を退避
          mkdir -p /tmp/gen
          cp backend/output/data.json /tmp/gen/data.json
          cp -r backend/output /tmp/gen/output
          # 最新のリポジトリ状態を取り直す（実行中に何を更新されてもOK）
          git fetch origin main
          git reset --hard origin/main
          # 生成物を載せ直して保存
          cp /tmp/gen/data.json ./data.json
          rm -rf backend/output && cp -r /tmp/gen/output backend/output
          git add data.json backend/output
          git diff --cached --quiet || git commit -m "auto: update tournament data ($(date +%F))"
          # それでも一瞬の差で負けたら、取り直してもう一度（最大3回）
          for i in 1 2 3; do
            git push && exit 0
            echo "push retry $i"
            git fetch origin main && git rebase origin/main || git rebase --skip || true
            sleep 5
          done
          git push
