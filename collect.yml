# 全国バドミントン成績 自動収集（週1回、クラウドで実行。手元作業ゼロ）
name: collect-badminton-results
on:
  schedule:
    - cron: "0 21 * * 5"   # 毎週土曜 朝6時(JST)
  workflow_dispatch: {}     # 手動実行ボタンも使える
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install free OCR (日本語tesseract + poppler)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-jpn poppler-utils
      - name: install deps
        working-directory: backend
        run: npm install
      - name: collect (全国巡回 → data.json)
        working-directory: backend
        run: node auto.js
      - name: publish data.json to site root
        run: cp backend/output/data.json ./data.json
      - name: commit & push
        run: |
          git config user.name "collector-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json backend/output || true
          git diff --cached --quiet || git commit -m "auto: update tournament data ($(date +%F))"
          # 実行中にリモートが更新されていても取り込んでからpush（最大3回リトライ）
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "push retry $i"; sleep 5
          done
